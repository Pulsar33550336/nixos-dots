# 1. 启动器/Shell

bind = SUPER, Super_L, exec, $ipc launcher toggle #"切换搜索"
bind = SUPER, Super_R, exec, $ipc launcher toggle # [hidden]

bindd = Super, V, 剪贴板历史 >> 剪贴板, exec, $ipc launcher clipboard #"剪贴板历史"
bindd = Super, Period, 表情符号 >> 剪贴板, exec, $ipc launcher emoji #"表情符号"
bind = Super, A, exec, $ipc controlCenter toggle #"切换侧边栏"
bind = Super, B, exec, $ipc controlCenter toggle # [hidden]
bind = Super, O, exec, $ipc controlCenter toggle # [hidden]
bindd = Super, N, 切换侧边栏, exec, $ipc controlCenter toggle # [hidden]
bindd = Super, Slash, 切换速查表, exec, $ipc plugin:keybind-cheatsheet toggle # 切换速查表
# bindd = Super, K, 切换屏幕键盘, global, quickshell:oskToggle # 切换屏幕键盘
bindd = Super, M, 切换媒体控件, exec, $ipc media toggle #"切换媒体控件"
# bind = Super, G, global, quickshell:overlayToggle # 切换叠加层
bindd = Ctrl+Alt, Delete, 切换会话菜单, exec, $ipc sessionMenu toggle #"切换会话菜单"
bindd = Super, J, 切换顶栏, exec, $ipc bar toggle #"切换顶栏"
bind = Ctrl+Alt, Delete, exec, $ipc TEST_ALIVE || pkill wlogout || wlogout -p layer-shell # [hidden] 会话菜单 (备用)

bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase # [hidden]
# bindle=, XF86MonBrightnessDown, exec, $ipc brightness decrement || brightnessctl s 5%- # [hidden]
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease # [hidden]
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase # [hidden]
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease # [hidden]
bindl = , XF86AudioMute, exec, $ipc volume muteOutput # [hidden]
bindld = Super+Shift,M, 切换静音, exec, $ipc volume muteOutput # [hidden]
bindl = Alt ,XF86AudioMute, exec, $ipc volume muteOutput # [hidden]
bindl = ,XF86AudioMicMute, exec, $ipc volume muteOutput # [hidden]
bindld = Super+Alt,M, 切换麦克风, exec, $ipc volume muteOutput # [hidden]

bindd = Ctrl+Super, T, 切换壁纸选择器, exec, $ipc wallpaper toggle #"壁纸选择器"
bindd = Ctrl+Super+Alt, T, 选择随机壁纸, exec, $ipc wallpaper random #"随机壁纸"
bind = Ctrl+Super, R, exec, pkill quickshell; noctalia-shell --allow-duplicate & #"重启小部件"

# 2. 实用工具
# 截图、录屏、OCR、取色器、剪贴板历史
bind = Super+Shift, S, exec, $ipc plugin:screen-shot-and-record screenshot #"区域截图"
bind = Super+Shift, A, exec, $ipc plugin:screen-shot-and-record search #"以图搜图 (Google Lens)"
# OCR
bind = Super+Shift, X, exec, $ipc plugin:screen-shot-and-record ocr #"文字识别 >> 剪贴板"
bind = Super+Shift, T, exec, $ipc plugin:screen-shot-and-record ocr # [hidden]
bind = Super+Shift, X,exec, $ipc TEST_ALIVE || pidof slurp || grim -g "$(slurp $SLURP_ARGS)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout -l $(tesseract --list-langs | awk 'NR>1{print $1}' | tr '\\n' '+' | sed 's/\\+$/\\n/') | wl-copy && rm "/tmp/ocr_image.png" # [hidden]
bind = Super+Shift, T,exec, $ipc TEST_ALIVE || pidof slurp || grim -g "$(slurp $SLURP_ARGS)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout -l $(tesseract --list-langs | awk 'NR>1{print $1}' | tr '\\n' '+' | sed 's/\\+$/\\n/') | wl-copy && rm "/tmp/ocr_image.png" # [hidden]
# 取色器
bindd = Super+Shift, C, 取色器, exec, hyprpicker -a #"取色 (十六进制)"
# 全屏截图
bindl = ,Print,exec,grim - | wl-copy #"截图 >> 剪贴板"
bindln = Ctrl,Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png #"截图 >> 剪贴板 & 文件 (文件)"
bindln = Ctrl,Print,exec,grim - | wl-copy # [hidden] 截图 >> 剪贴板 & 文件 (剪贴板)
# 录屏相关
bindl = Super+Shift, R, exec, $ipc plugin:screen-shot-and-record record #"录制区域 (无声音)"
bindl = Super+Alt, R, exec, $ipc plugin:screen-shot-and-record record # [hidden] 录制区域 (无声音)
bindl = Ctrl+Alt, R, exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen # [hidden] 录制全屏 (无声音)
bindl = Super+Shift+Alt, R, exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen --sound #"录制全屏 (有声音)""

# 3. 窗口
# 聚焦
bindm = Super, mouse:272, movewindow #"移动"
bindm = Super, mouse:274, movewindow # [hidden]
bindm = Super, mouse:273, resizewindow #"调整大小"
bind = Super, ←/↑/→/↓, exec, "" #"按方向聚焦"
bind = Super, Left, movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up, movefocus, u # [hidden]
bind = Super, Down, movefocus, d # [hidden]
bind = Super, BracketLeft, movefocus, l # [hidden]
bind = Super, BracketRight, movefocus, r # [hidden]
bind = Super+Shift, ←/↑/→/↓, exec, "" #"按方向移动"
bind = Super+Shift, Left, movewindow, l # [hidden]
bind = Super+Shift, Right, movewindow, r # [hidden]
bind = Super+Shift, Up, movewindow, u # [hidden]
bind = Super+Shift, Down, movewindow, d # [hidden]
bind = Alt, F4, killactive, # [hidden] 关闭 (Windows方式)
bind = Super, Q, killactive, #"关闭"
bind = Super+Shift+Alt, Q, exec, hyprctl kill #"强制关闭窗口"

# 窗口分割比例
binde = Super, ;/', exec, "" #"调整分割比例"
binde = Super, Semicolon, splitratio, -0.1 # [hidden]
binde = Super, Apostrophe, splitratio, +0.1 # [hidden]
# 位置模式
bind = Super+Alt, Space, togglefloating, #"浮动/平铺"
bind = Super, D, fullscreen, 1 #"最大化"
bind = Super, F, fullscreen, 0 #"全屏"
bind = Super+Alt, F, fullscreenstate, 0 3 #"伪全屏"
bind = Super, P, pin #"置顶"

bind = Super+Alt, Hash, exec, "" #"发送到工作区 # (1, 2, 3,...)""
# 我们使用原始键码，因为一些键盘布局会将数字键注册为不同的字符。可以通过 `wev` 验证键码
