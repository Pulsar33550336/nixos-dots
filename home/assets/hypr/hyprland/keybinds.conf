# 5. 虚拟机
bind = Super+Alt, F1, exec, notify-send '进入虚拟机子映射' '按键绑定已禁用。按 Super+Alt+F1 退出' -a 'Hyprland' && hyprctl dispatch submap virtual-machine #"禁用按键绑定"
submap = virtual-machine
bind = Super+Alt, F1, exec, notify-send '退出虚拟机子映射' '按键绑定已重新启用' -a 'Hyprland' && hyprctl dispatch submap global # [hidden]
submap = global

#!
# 测试
bind = Super+Alt, f11, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "带主体图像的测试通知" "此通知应包含您的用户账户 <b>图像</b> 和 <a href=\"https://discord.com/app\">Discord</a> <b>图标</b>。哦，这里还有您 Pictures 文件夹中的随机图像：<img src=\"$RANDOM_IMAGE\" alt=\"测试图像\"/>" -a "Hyprland 按键绑定" -p -h "string:image-path:/var/lib/AccountsService/icons/$USER" -t 6000 -i "discord" -A "openImage=个人资料图像" -A "action2=打开随机图像" -A "action3=无用按钮"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"; [[ $ACTION == *action2 ]] && xdg-open \"$RANDOM_IMAGE\"' # [hidden]
bind = Super+Alt, f12, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy=" | shuf -n 1); ACTION=$(notify-send "测试通知" "此通知应包含您 <b>Pictures</b> 文件夹中的随机图像和 <a href=\"https://discord.com/app\">Discord</a> <b>图标</b>。\n<i>向右滑动以关闭！</i>" -a "Discord (假的)" -p -h "string:image-path:$RANDOM_IMAGE" -t 6000 -i "discord" -A "openImage=个人资料图像" -A "action2=无用按钮"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"' # [hidden]
bind = Super+Alt, Equal, exec, notify-send "紧急通知" "糟了" -u critical -a 'Hyprland 按键绑定' # [hidden]

# 6. 会话
bindd = Super, L, 锁定, exec, $ipc lockScreen lock #"锁定"
bindld = Super+Shift, L, 挂起系统, exec, $ipc lockScreen lock; systemctl suspend || loginctl suspend #"睡眠"
bindl=,switch:on:Lid Switch, exec, $ipc lockScreen lock; systemctl suspend || loginctl suspend # [hidden] 笔记本电脑合盖时挂起，如果默认行为不是这样，请取消注释
bindd = Ctrl+Shift+Alt+Super, Delete, 关机, exec, systemctl poweroff || loginctl poweroff # [hidden] 关机

# 7. 屏幕
# 缩放
binde = Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3 #"缩小"
binde = Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3 #"放大"
# 小键盘缩放
binde = Super, code:82, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.1 # [hidden] 缩小
binde = Super, code:86, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.1 # [hidden] 放大

# 8. 媒体
bindl= Super+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` #"下一曲"
bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= ,XF86AudioPrev, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= Super+Shift, B, exec, playerctl previous #"上一曲"
bindl= Super+Shift, P, exec, playerctl play-pause #"播放/暂停媒体"
bindl= ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl= ,XF86AudioPause, exec, playerctl play-pause # [hidden]

# 9. 应用
bind = Super, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" #"终端"
bind = Super, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh  "${TERMINAL}" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden] (终端) (备用)
bind = Ctrl+Alt, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden] (终端) (给 Ubuntu 用户)
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "${TERMINAL}" "kitty -1 fish -c yazi" #"文件管理器"
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf" #"浏览器"
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro" #"代码编辑器"
bind = Ctrl+Super+Shift+Alt, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "wps" "onlyoffice-desktopeditors" "libreoffice" #"办公软件"
bind = Super, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kwrite" "kate" "gnome-text-editor" "emacs" #"文本编辑器"
bind = Ctrl+Super, V, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol" #"音量合成器"
bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "$ipc settings toggle" "systemsettings" "gnome-control-center" "better-control" #"设置应用"
bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop" #"任务管理器"

# 奇怪的东西
## 让窗口不要那么大
bind = Ctrl+Super, Backslash, resizeactive, exact 640 480 # [hidden]